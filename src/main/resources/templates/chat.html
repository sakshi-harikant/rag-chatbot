<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind AI - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ===== FLOATING BACKGROUND EFFECTS ===== */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 600px;
            height: 600px;
            background: #667eea;
            top: -10%;
            right: -10%;
            animation: floatOrb1 25s ease-in-out infinite alternate;
        }
        body::after {
            width: 500px;
            height: 500px;
            background: #764ba2;
            bottom: -10%;
            left: -10%;
            animation: floatOrb2 30s ease-in-out infinite alternate;
        }
        @keyframes floatOrb1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-100px, 80px) scale(1.3); }
        }
        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, -100px) scale(1.4); }
        }

        /* ===== GLOWING DOTS ===== */
        .glow-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .glow-dot {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.15), transparent 70%);
            width: 8px;
            height: 8px;
            animation: floatDot 15s infinite linear;
        }
        .glow-dot:nth-child(1) { left: 10%; top: 20%; animation-duration: 18s; }
        .glow-dot:nth-child(2) { left: 30%; top: 60%; animation-duration: 22s; animation-delay: 3s; }
        .glow-dot:nth-child(3) { left: 60%; top: 30%; animation-duration: 20s; animation-delay: 5s; }
        .glow-dot:nth-child(4) { left: 80%; top: 70%; animation-duration: 25s; animation-delay: 7s; }
        .glow-dot:nth-child(5) { left: 50%; top: 10%; animation-duration: 28s; animation-delay: 2s; }
        .glow-dot:nth-child(6) { left: 20%; top: 90%; animation-duration: 23s; animation-delay: 6s; }
        .glow-dot:nth-child(7) { left: 70%; top: 50%; animation-duration: 26s; animation-delay: 9s; }
        .glow-dot:nth-child(8) { left: 90%; top: 15%; animation-duration: 30s; animation-delay: 4s; }
        .glow-dot:nth-child(9) { left: 40%; top: 80%; animation-duration: 21s; animation-delay: 8s; }
        .glow-dot:nth-child(10) { left: 5%; top: 45%; animation-duration: 27s; animation-delay: 1s; }

        @keyframes floatDot {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            25% { transform: translateY(-30px) scale(1.5); opacity: 0.6; }
            50% { transform: translateY(20px) scale(0.8); opacity: 0.2; }
            75% { transform: translateY(-10px) scale(1.2); opacity: 0.5; }
            100% { transform: translateY(0) scale(1); opacity: 0.3; }
        }

        /* ===== PARTICLES ===== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
            opacity: 0.12;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.12; }
            90% { opacity: 0.12; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: linear-gradient(180deg, #1a0a2e 0%, #0d0d2b 50%, #1a0a2e 100%);
            border-right: 1px solid rgba(102, 126, 234, 0.08);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
        }
        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(102, 126, 234, 0.06), transparent 70%);
            pointer-events: none;
        }

        .sidebar .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }
        .sidebar .user-info img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(102, 126, 234, 0.25);
        }
        .sidebar .user-info .name {
            font-weight: 600;
            font-size: 14px;
            color: #e8e8f0;
        }
        .sidebar .user-info .email {
            font-size: 11px;
            color: #8888a0;
        }

        .sidebar .new-chat-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 16px;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sidebar .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        /* ===== IMPROVED CHAT HISTORY ===== */
        .sidebar .chat-list {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            padding-right: 4px;
        }
        .sidebar .chat-list .chat-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 13px;
            color: #a0a0b0;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            position: relative;
            gap: 10px;
        }
        .sidebar .chat-list .chat-item .doc-icon {
            font-size: 14px;
            opacity: 0.6;
            flex-shrink: 0;
        }
        .sidebar .chat-list .chat-item .chat-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sidebar .chat-list .chat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            border-radius: 0 4px 4px 0;
            background: linear-gradient(180deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar .chat-list .chat-item:hover {
            background: rgba(102, 126, 234, 0.08);
            color: #e0e0e0;
            border-color: rgba(102, 126, 234, 0.06);
            transform: translateX(2px);
        }
        .sidebar .chat-list .chat-item:hover .doc-icon {
            opacity: 1;
        }
        .sidebar .chat-list .chat-item.active {
            background: rgba(102, 126, 234, 0.12);
            color: #ffffff;
            border-color: rgba(102, 126, 234, 0.1);
        }
        .sidebar .chat-list .chat-item.active::before {
            opacity: 1;
        }
        .sidebar .chat-list .chat-item.active .doc-icon {
            opacity: 1;
        }
        .sidebar .chat-list .chat-item .menu-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .sidebar .chat-list .chat-item:hover .menu-btn {
            opacity: 1;
        }
        .sidebar .chat-list .chat-item .menu-btn:hover {
            color: #667eea;
        }

        .sidebar .logout-btn {
            padding: 10px 16px;
            border: 1px solid rgba(102, 126, 234, 0.12);
            background: rgba(255, 255, 255, 0.02);
            color: #a0a0b0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            margin-top: 12px;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sidebar .logout-btn:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: rgba(102, 126, 234, 0.25);
            color: #e0e0e0;
        }

        /* ===== MAIN CHAT ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1f;
            position: relative;
            z-index: 1;
        }
        .main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 80% 20%, rgba(102, 126, 234, 0.05), transparent 60%);
            pointer-events: none;
        }

        .main .header {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .main .header .title {
            font-size: 16px;
            font-weight: 600;
            color: #e8e8f0;
        }
        .main .header .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #8888a0;
        }
        .main .header .brand .dot {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        .main .upload-area {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.01);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 12px;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .main .upload-area label {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid rgba(102, 126, 234, 0.08);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .main .upload-area label:hover {
            background: rgba(102, 126, 234, 0.2);
        }
        .main .upload-area input[type="file"] {
            display: none;
        }
        .main .upload-area .status {
            font-size: 12px;
            color: #666;
        }

        /* ===== CHAT AREA ===== */
        .main .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        /* ===== WELCOME SCREEN WITH CENTER ANIMATION ===== */
        .welcome-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 20px;
            /* Center animation - starts slightly down and smaller, rises up */
            animation: floatUpFromCenter 0.7s cubic-bezier(0.15, 0.85, 0.35, 1.05) forwards;
            opacity: 0;
            transform: translate(-50%, -40%) scale(0.95);
        }

        @keyframes floatUpFromCenter {
            0% {
                opacity: 0;
                transform: translate(-50%, -40%) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .welcome-screen .bot-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            display: block;
            animation: floatBot 4s ease-in-out infinite;
            filter: drop-shadow(0 0 50px rgba(102, 126, 234, 0.25));
        }
        .welcome-screen .bot-icon .glow-ring {
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; filter: blur(2px); }
            50% { opacity: 0.8; filter: blur(4px); }
        }
        @keyframes floatBot {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .welcome-screen h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .welcome-screen p {
            color: #8888a0;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .welcome-screen .features-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .welcome-screen .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 13px;
            color: #a0a0b0;
            transition: all 0.3s;
        }
        .welcome-screen .feature-item:hover {
            border-color: rgba(102, 126, 234, 0.2);
            background: rgba(102, 126, 234, 0.05);
        }
        .welcome-screen .feature-item .icon {
            font-size: 16px;
        }

        /* ===== PROFESSIONAL UPLOAD BUTTON ===== */
        .welcome-screen .upload-btn {
            padding: 14px 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 25px rgba(102, 126, 234, 0.25);
        }
        .welcome-screen .upload-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .welcome-screen .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(102, 126, 234, 0.4);
        }
        .welcome-screen .or-text {
            color: #444;
            font-size: 13px;
            margin: 16px 0 8px;
        }
        .welcome-screen .hint {
            color: #555;
            font-size: 12px;
        }

        .main .chat-area .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: fadeIn 0.3s ease;
            position: relative;
            z-index: 1;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .main .chat-area .user-message {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .main .chat-area .bot-message {
            background: rgba(255, 255, 255, 0.04);
            color: #d0d0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .main .chat-area .bot-message .source {
            font-size: 11px;
            color: #667eea;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .main .chat-area .bot-message .source span {
            background: rgba(102, 126, 234, 0.08);
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 500;
            display: inline-block;
            margin-right: 4px;
        }

        /* ===== IMPROVED INPUT BOX ===== */
        .main .input-area {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 12px;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .main .input-area .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 4px 4px 4px 18px;
            transition: all 0.3s;
        }
        .main .input-area .input-wrapper:focus-within {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.05);
        }
        .main .input-area .input-wrapper .attach-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            transition: color 0.3s;
            display: flex;
            align-items: center;
        }
        .main .input-area .input-wrapper .attach-btn:hover {
            color: #667eea;
        }
        .main .input-area .input-wrapper input {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14px;
            color: #e0e0e0;
            min-width: 0;
        }
        .main .input-area .input-wrapper input::placeholder {
            color: #555;
        }
        .main .input-area .input-wrapper .send-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .main .input-area .input-wrapper .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .main .input-area .input-wrapper .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .main .input-area .input-wrapper .send-btn .hint {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.6;
        }

        .typing {
            color: #666;
            font-size: 13px;
            padding: 8px 0;
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 1;
        }
        .typing .dot {
            width: 6px;
            height: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            animation: typingDot 1.4s infinite;
        }
        .typing .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ===== SCROLLBAR ===== */
        .sidebar .chat-list::-webkit-scrollbar,
        .main .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar .chat-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar .chat-list::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 4px;
        }
        .main .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .main .chat-area::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.2);
            border-radius: 4px;
        }

        /* ===== CHAT MENU ===== */
        #chatMenu {
            position: fixed;
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            padding: 4px 0;
            z-index: 999;
            min-width: 140px;
            backdrop-filter: blur(20px);
        }
        #chatMenu .menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #a0a0b0;
            transition: all 0.2s;
        }
        #chatMenu .menu-item:hover {
            background: rgba(102, 126, 234, 0.08);
            color: #e0e0e0;
        }
        #chatMenu .menu-item.danger {
            color: #ff4757;
        }
        #chatMenu .menu-item.danger:hover {
            background: rgba(255, 71, 87, 0.08);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { width: 240px; min-width: 240px; padding: 16px 12px; }
            .main .header { padding: 12px 16px; }
            .main .upload-area { padding: 10px 16px; flex-wrap: wrap; }
            .main .chat-area { padding: 16px 16px 8px; }
            .main .input-area { padding: 12px 16px; }
            .main .chat-area .message { max-width: 85%; font-size: 13px; }
            .welcome-screen h1 { font-size: 24px; }
            .welcome-screen .bot-icon { width: 80px; height: 80px; }
            .welcome-screen .features-grid { gap: 12px; }
            .main .input-area .input-wrapper .send-btn .hint { display: none; }
        }
        @media (max-width: 480px) {
            .sidebar { width: 200px; min-width: 200px; padding: 12px 10px; }
            .sidebar .user-info .name { font-size: 12px; }
            .sidebar .user-info .email { font-size: 10px; }
            .main .chat-area .message { max-width: 92%; font-size: 12px; padding: 8px 12px; }
            .main .input-area .input-wrapper { padding: 2px 2px 2px 12px; }
            .main .input-area .input-wrapper input { font-size: 12px; padding: 8px 10px; }
            .main .input-area .input-wrapper .send-btn { padding: 8px 14px; font-size: 12px; }
            .welcome-screen .bot-icon { width: 60px; height: 60px; }
            .welcome-screen h1 { font-size: 20px; }
            .welcome-screen p { font-size: 13px; }
            .welcome-screen .upload-btn { padding: 10px 28px; font-size: 13px; }
        }
    </style>
</head>
<body>

<!-- GLOWING DOTS -->
<div class="glow-dots">
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="user-info" id="userInfo">
        <img id="userPic" src="" alt="Profile">
        <div>
            <div class="name" id="userName">User</div>
            <div class="email" id="userEmail">email@example.com</div>
        </div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <div class="chat-list" id="chatList"></div>
    <button class="logout-btn" onclick="window.location.href='/logout'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
    </button>
</div>

<!-- MAIN -->
<div class="main">
    <div class="header">
        <div class="title" id="chatTitle">New Chat</div>
        <div class="brand">
            <span class="dot"></span>
            DocuMind AI
        </div>
    </div>

    <div class="upload-area">
        <label for="fileInput">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Upload Document
        </label>
        <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.html,.htm,.png,.jpg,.jpeg,.bmp,.gif,.tiff">
        <span class="status" id="uploadStatus"></span>
    </div>

    <div class="chat-area" id="chatArea">
        <!-- WELCOME SCREEN -->
        <div class="welcome-screen" id="welcomeScreen">
            <svg class="bot-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="glowGrad">
                        <stop offset="0%" stop-color="#667eea" stop-opacity="0.4"/>
                        <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
                    </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="45" fill="url(#glowGrad)" class="glow-ring"/>
                <rect x="15" y="20" width="70" height="50" rx="20" stroke="#667eea" stroke-width="2.5" fill="none" />
                <line x1="50" y1="20" x2="50" y2="8" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="50" cy="6" r="5" fill="#667eea" opacity="0.7" />
                <ellipse cx="35" cy="38" rx="9" ry="7" stroke="#667eea" stroke-width="2" fill="none" />
                <ellipse cx="65" cy="38" rx="9" ry="7" stroke="#667eea" stroke-width="2" fill="none" />
                <circle cx="35" cy="38" r="3.5" fill="#667eea" opacity="0.8" />
                <circle cx="65" cy="38" r="3.5" fill="#667eea" opacity="0.8" />
                <path d="M35 52 Q50 62 65 52" stroke="#667eea" stroke-width="2.5" fill="none" stroke-linecap="round" />
                <rect x="5" y="30" width="14" height="16" rx="7" stroke="#667eea" stroke-width="2" fill="none" />
                <rect x="81" y="30" width="14" height="16" rx="7" stroke="#667eea" stroke-width="2" fill="none" />
                <rect x="25" y="72" width="50" height="22" rx="10" stroke="#667eea" stroke-width="2.5" fill="none" />
                <line x1="15" y1="75" x2="5" y2="88" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" />
                <line x1="85" y1="75" x2="95" y2="88" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" />
                <path d="M45 80 Q47 76 50 80 Q53 76 55 80 Q57 86 50 92 Q43 86 45 80Z" fill="#667eea" opacity="0.5" />
            </svg>

            <h1>Welcome to DocuMind AI</h1>
            <p>Upload a PDF, DOCX, or TXT file and start asking questions about your documents.</p>

            <div class="features-grid">
                <div class="feature-item"><span class="icon">📄</span> Upload Documents</div>
                <div class="feature-item"><span class="icon">💬</span> Ask Questions</div>
                <div class="feature-item"><span class="icon">⚡</span> Instant Answers</div>
            </div>

            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                Upload Document
            </button>

            <div class="or-text">or</div>
            <div class="hint">Type a question below to get started</div>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <div class="input-wrapper">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach document">📎</button>
            <input type="text" id="userInput" placeholder="Ask anything about your documents..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn" class="send-btn">
                ➤ <span class="hint">Enter</span>
            </button>
        </div>
    </div>
</div>

<script>
    // ===== PARTICLES =====
    (function() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = (Math.random() * 3 + 1) + 'px';
            p.style.height = p.style.width;
            p.style.animationDuration = (Math.random() * 25 + 15) + 's';
            p.style.animationDelay = (Math.random() * 25) + 's';
            container.appendChild(p);
        }
    })();

    let currentSessionId = null;

    // Load user info
    fetch('/user')
        .then(res => res.json())
        .then(user => {
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userPic').src = user.picture;
        })
        .catch(() => {});

    // Load chat sessions
    function loadSessions() {
        fetch('/api/sessions')
            .then(res => res.json())
            .then(sessions => {
                const list = document.getElementById('chatList');
                list.innerHTML = '';
                sessions.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'chat-item' + (s.id === currentSessionId ? ' active' : '');
                    div.style.display = 'flex';
                    div.style.justifyContent = 'space-between';
                    div.style.alignItems = 'center';

                    const icon = document.createElement('span');
                    icon.className = 'doc-icon';
                    icon.textContent = '📄';

                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'chat-title';
                    titleSpan.textContent = s.title || 'Untitled';
                    titleSpan.onclick = () => loadChat(s.id);

                    const menuBtn = document.createElement('button');
                    menuBtn.textContent = '⋮';
                    menuBtn.className = 'menu-btn';
                    menuBtn.onclick = (e) => {
                        e.stopPropagation();
                        toggleChatMenu(e, s.id, s.title);
                    };

                    div.appendChild(icon);
                    div.appendChild(titleSpan);
                    div.appendChild(menuBtn);
                    list.appendChild(div);
                });
            });
    }

    function toggleChatMenu(event, sessionId, currentTitle) {
        const existing = document.getElementById('chatMenu');
        if (existing) { existing.remove(); return; }

        const menu = document.createElement('div');
        menu.id = 'chatMenu';
        const rect = event.target.getBoundingClientRect();
        menu.style.top = (rect.bottom + 6) + 'px';
        menu.style.left = (rect.left - 60) + 'px';

        const rename = document.createElement('div');
        rename.className = 'menu-item';
        rename.textContent = '✏️ Rename';
        rename.onclick = () => { menu.remove();
            renameChat(sessionId, currentTitle); };
        menu.appendChild(rename);

        const del = document.createElement('div');
        del.className = 'menu-item danger';
        del.textContent = '🗑️ Delete';
        del.onclick = () => { menu.remove();
            deleteChat(sessionId); };
        menu.appendChild(del);

        document.addEventListener('click', function close(e) {
            if (!menu.contains(e.target)) { menu.remove();
                document.removeEventListener('click', close); }
        });
        document.body.appendChild(menu);
    }

    function renameChat(sessionId, currentTitle) {
        const newTitle = prompt('Enter new chat name:', currentTitle || 'Untitled');
        if (!newTitle || !newTitle.trim()) return;
        fetch('/api/sessions/' + sessionId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: newTitle.trim() })
        }).then(() => { loadSessions(); if (currentSessionId === sessionId) document.getElementById('chatTitle').textContent = newTitle.trim(); });
    }

    function deleteChat(sessionId) {
        if (!confirm('Delete this chat?')) return;
        fetch('/api/sessions/' + sessionId, { method: 'DELETE', headers: { 'Content-Type': 'application/json' } })
            .then(() => {
                if (currentSessionId === sessionId) {
                    currentSessionId = null;
                    document.getElementById('chatArea').innerHTML = '';
                    showWelcomeScreen();
                    document.getElementById('chatTitle').textContent = 'New Chat';
                }
                loadSessions();
            });
    }

    function loadChat(sessionId) {
        currentSessionId = sessionId;
        document.getElementById('chatTitle').textContent = 'Chat';
        document.getElementById('welcomeScreen')?.remove();
        fetch('/api/messages/' + sessionId)
            .then(res => res.json())
            .then(messages => {
                const area = document.getElementById('chatArea');
                const welcome = document.getElementById('welcomeScreen');
                if (welcome) welcome.remove();
                area.innerHTML = '';
                messages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'message ' + (m.role === 'user' ? 'user-message' : 'bot-message');
                    div.innerHTML = m.content ? m.content.replace(/\n/g, '<br>') : '';
                    if (m.sources && m.sources.length > 0) {
                        div.innerHTML += '<div class="source">📄 Sources: ' + m.sources.map(s => '<span>' + s + '</span>').join('') + '</div>';
                    }
                    area.appendChild(div);
                });
                area.scrollTop = area.scrollHeight;
                loadSessions();
            });
    }

    function showWelcomeScreen() {
        const area = document.getElementById('chatArea');
        const existing = document.getElementById('welcomeScreen');
        if (existing) return;

        const welcome = document.createElement('div');
        welcome.className = 'welcome-screen';
        welcome.id = 'welcomeScreen';
        welcome.innerHTML = `
                <svg class="bot-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="glowGrad">
                            <stop offset="0%" stop-color="#667eea" stop-opacity="0.4"/>
                            <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="url(#glowGrad)" class="glow-ring"/>
                    <rect x="15" y="20" width="70" height="50" rx="20" stroke="#667eea" stroke-width="2.5" fill="none" />
                    <line x1="50" y1="20" x2="50" y2="8" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" />
                    <circle cx="50" cy="6" r="5" fill="#667eea" opacity="0.7" />
                    <ellipse cx="35" cy="38" rx="9" ry="7" stroke="#667eea" stroke-width="2" fill="none" />
                    <ellipse cx="65" cy="38" rx="9" ry="7" stroke="#667eea" stroke-width="2" fill="none" />
                    <circle cx="35" cy="38" r="3.5" fill="#667eea" opacity="0.8" />
                    <circle cx="65" cy="38" r="3.5" fill="#667eea" opacity="0.8" />
                    <path d="M35 52 Q50 62 65 52" stroke="#667eea" stroke-width="2.5" fill="none" stroke-linecap="round" />
                    <rect x="5" y="30" width="14" height="16" rx="7" stroke="#667eea" stroke-width="2" fill="none" />
                    <rect x="81" y="30" width="14" height="16" rx="7" stroke="#667eea" stroke-width="2" fill="none" />
                    <rect x="25" y="72" width="50" height="22" rx="10" stroke="#667eea" stroke-width="2.5" fill="none" />
                    <line x1="15" y1="75" x2="5" y2="88" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="85" y1="75" x2="95" y2="88" stroke="#667eea" stroke-width="2.5" stroke-linecap="round" />
                    <path d="M45 80 Q47 76 50 80 Q53 76 55 80 Q57 86 50 92 Q43 86 45 80Z" fill="#667eea" opacity="0.5" />
                </svg>
                <h1>Welcome to DocuMind AI</h1>
                <p>Upload a PDF, DOCX, or TXT file and start asking questions about your documents.</p>
                <div class="features-grid">
                    <div class="feature-item"><span class="icon">📄</span> Upload Documents</div>
                    <div class="feature-item"><span class="icon">💬</span> Ask Questions</div>
                    <div class="feature-item"><span class="icon">⚡</span> Instant Answers</div>
                </div>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    Upload Document
                </button>
                <div class="or-text">or</div>
                <div class="hint">Type a question below to get started</div>
            `;
        area.appendChild(welcome);
    }

    function newChat() {
        currentSessionId = null;
        document.getElementById('chatArea').innerHTML = '';
        showWelcomeScreen();
        document.getElementById('chatTitle').textContent = 'New Chat';
        loadSessions();
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;

        const welcome = document.getElementById('welcomeScreen');
        if (welcome) welcome.remove();

        const area = document.getElementById('chatArea');
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.textContent = message;
        area.appendChild(userDiv);
        input.value = '';
        area.scrollTop = area.scrollHeight;

        const typing = document.createElement('div');
        typing.className = 'typing';
        typing.innerHTML = '<span>AI is thinking</span><span class="dot"></span><span class="dot"></span><span class="dot"></span>';
        area.appendChild(typing);
        area.scrollTop = area.scrollHeight;
        document.getElementById('sendBtn').disabled = true;

        fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, sessionId: currentSessionId })
        })
            .then(res => res.json())
            .then(data => {
                typing.remove();
                document.getElementById('sendBtn').disabled = false;
                if (!currentSessionId && data.sessionId) {
                    currentSessionId = data.sessionId;
                    document.getElementById('chatTitle').textContent = 'Chat';
                }
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot-message';
                botDiv.innerHTML = data.answer ? data.answer.replace(/\n/g, '<br>') : '';
                if (data.sources && data.sources.length > 0) {
                    botDiv.innerHTML += '<div class="source">📄 Sources: ' + data.sources.map(s => '<span>' + s + '</span>').join('') + '</div>';
                }
                area.appendChild(botDiv);
                area.scrollTop = area.scrollHeight;
                loadSessions();
            })
            .catch(() => {
                typing.remove();
                document.getElementById('sendBtn').disabled = false;
                const errDiv = document.createElement('div');
                errDiv.className = 'message bot-message';
                errDiv.textContent = '❌ Something went wrong. Please try again.';
                area.appendChild(errDiv);
                area.scrollTop = area.scrollHeight;
            });
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    // File upload
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const welcome = document.getElementById('welcomeScreen');
        if (welcome) welcome.remove();

        if (!currentSessionId) {
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Uploading document...', sessionId: null })
            })
                .then(res => res.json())
                .then(data => { currentSessionId = data.sessionId;
                    document.getElementById('chatTitle').textContent = 'Chat';
                    uploadFile(file); });
        } else {
            uploadFile(file);
        }
    });

    function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('sessionId', currentSessionId || '');
        document.getElementById('uploadStatus').textContent = '📤 Uploading...';
        fetch('/api/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                document.getElementById('uploadStatus').textContent = '✅ ' + data.message;
                loadSessions();
            })
            .catch(() => {
                document.getElementById('uploadStatus').textContent = '❌ Upload failed';
            });
    }

    showWelcomeScreen();
    loadSessions();
</script>
</body>
</html>
